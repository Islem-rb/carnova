<div class="split-layout flex min-h-screen">
  <!-- Left Welcome Section -->
  <div class="welcome-section hidden md:flex flex-col justify-center items-center
              bg-gradient-to-t from-black via-purple-950 to-purple-800
              text-white p-8 w-full md:w-1/2 lg:w-2/5">
    <div class="max-w-md mx-auto text-center">
      <div class="flex items-center justify-center mb-6">
        <i class="fas fa-car text-4xl mr-3 text-yellow-300"></i>
        <h1 class="text-3xl font-bold text-white">CarNova</h1>
      </div>
      <p class="text-xl mb-8">Your gateway to the perfect vehicle</p>
      <div class="car-illustration h-48 mb-8"></div>
      <p class="text-blue-100 mb-4">
        Join thousands of happy buyers and sellers in our trusted marketplace.
      </p>
      <div class="flex justify-center space-x-4 mt-6">
        <div class="bg-white bg-opacity-20 rounded-full p-2">
          <i class="fas fa-shield-alt text-white"></i>
        </div>
        <div class="bg-white bg-opacity-20 rounded-full p-2">
          <i class="fas fa-tag text-white"></i>
        </div>
        <div class="bg-white bg-opacity-20 rounded-full p-2">
          <i class="fas fa-search text-white"></i>
        </div>
      </div>
    </div>
  </div>

  <!-- Right Form Section -->
  <div class="form-section flex flex-col justify-center w-full md:w-1/2 lg:w-3/5 p-8 bg-white">
    <div class="max-w-md mx-auto w-full">
      <h2 class="text-2xl font-bold text-gray-800 mb-6">Connexion</h2>
      <form (ngSubmit)="onLogin()" #loginForm="ngForm">
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
          <input type="email"
                 class="w-full px-4 py-2 border rounded-lg"
                 [(ngModel)]="email" name="email" required />
        </div>
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1">Mot de passe</label>
          <input type="password"
                 class="w-full px-4 py-2 border rounded-lg"
                 [(ngModel)]="password" name="password" required minlength="8" />
        </div>
        <div *ngIf="error" class="text-red-600 mb-2">{{ error }}</div>
       <button type="submit"
        class="w-full btn-gradient-purple font-medium py-2 px-4 shadow-md">
  Se connecter
</button>

      </form>
      <div class="mt-4 text-center">
        <span>Pas encore de compte ?</span>
        <a routerLink="/Registre"
           class="text-blue-600 hover:text-blue-800 font-medium">Créer un compte</a>
      </div>
    </div>
  </div>
</div>

<style>
.car-illustration {
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 500 300'><path fill='%23e2e8f0' d='M50,150 Q150,50 250,150 Q350,250 450,150' stroke='%23334e68' stroke-width='2' fill-opacity='0.2'/><path fill='%23334e68' d='M100,170 L120,170 L130,150 L170,150 L180,170 L400,170 L410,150 L450,150 L460,170 L480,170 L470,190 L110,190 Z'/><circle cx='150' cy='190' r='20' fill='%23334e68'/><circle cx='350' cy='190' r='20' fill='%23334e68'/><circle cx='150' cy='190' r='10' fill='%23e2e8f0'/><circle cx='350' cy='190' r='10' fill='%23e2e8f0'/><rect x='130' y='130' width='40' height='20' fill='%23334e68'/><rect x='330' y='130' width='40' height='20' fill='%23334e68'/></svg>");
  background-repeat: no-repeat;
  background-position: center;
  background-size: contain;
}

body {
  font-family: "Poppins", sans-serif;
  background-color: #f8fafc;
}

.input-error {
  border-color: #ef4444;
}

.error-message {
  color: #ef4444;
  font-size: 0.75rem;
  margin-top: 0.25rem;
  display: none;
}

.tab-active {
  border-bottom: 3px solid #3b82f6;
  color: #3b82f6;
  font-weight: 500;
}

@media (max-width: 768px) {
  .split-layout {
    flex-direction: column;
  }
  .welcome-section {
    padding: 2rem 1rem;
  }
  .form-section {
    padding: 2rem 1rem;
  }
}
</style>
